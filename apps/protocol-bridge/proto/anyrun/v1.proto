  SnapshotFileChunk state_file_chunk = 4;
  SnapshotFileChunk kernel_file_chunk = 5;
  IsoDevContainerMetadata dev_container_metadata = 6;
  repeated SnapshotExtraDriveFile extra_drive_files = 7;
